services:
  web:
    build:
      target: production
    ports:
      - '3000:3000'
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run

  api:
    build:
      target: production
    environment:
      NODE_ENV: production
      # ---------------------------------------------------------------------------
      # VARIÁVEIS DE IA OBRIGATÓRIAS EM PRODUÇÃO
      # Quando MOCK_EXTERNAL_SERVICES=false, as chaves abaixo são requeridas.
      # Nunca persista esses valores em código-fonte ou imagem Docker.
      # Prefira secrets do orquestrador (Docker Swarm secrets, AWS Secrets Manager,
      # Vault, etc.) ou variáveis de ambiente injetadas pelo CI/CD.
      # ---------------------------------------------------------------------------
      #
      # LlamaParse — Parse de PDFs e imagens financeiras
      # LLAMAPARSE_BASE_URL: https://api.llamaindex.ai
      # LLAMAPARSE_API_KEY: <sua-chave-llamaparse>
      # LLAMAPARSE_RESULT_TYPE: markdown
      # LLAMAPARSE_TIMEOUT_MS: 120000
      # LLAMAPARSE_POLL_INTERVAL_MS: 3000
      #
      # OpenRouter — Classificação dos itens extraídos por LLM
      # OPENROUTER_BASE_URL: https://openrouter.ai/api/v1
      # OPENROUTER_API_KEY: <sua-chave-openrouter>
      # OPENROUTER_MODEL_DEFAULT: openai/gpt-4.1-mini
      # OPENROUTER_HTTP_REFERER: https://seu-dominio.com
      # OPENROUTER_APP_TITLE: controle-financeiro
      #
      # Cognee — Contexto semântico e memória de longo prazo (opcional no MVP)
      # COGNEE_BASE_URL: https://api.cognee.ai
      # COGNEE_API_KEY: <sua-chave-cognee>
      # COGNEE_PROJECT_ID: <id-do-projeto>
      # COGNEE_TIMEOUT_MS: 30000
      #
      # Mock — Em produção, defina como false para acionar os serviços reais
      MOCK_EXTERNAL_SERVICES: 'false'
    ports:
      - '3001:3001'
    read_only: true
    tmpfs:
      - /tmp

  file-server:
    build:
      target: production
    environment:
      RAILS_ENV: production
    ports:
      - '3002:3002'

  postgres:
    ports: []

  minio:
    ports: []
