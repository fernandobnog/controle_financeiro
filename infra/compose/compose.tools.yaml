services:
  adminer:
    image: adminer:5.2.1
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '8080:8080'
    networks:
      - controle-financeiro
    cpus: 0.10
    mem_limit: 96m
    deploy:
      resources:
        limits:
          cpus: '0.10'
          memory: 96M
    healthcheck:
      test: ['CMD', 'php', '-r', 'exit(0);']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    stop_grace_period: 10s
    logging:
      driver: json-file
      options:
        max-size: 5m
        max-file: '2'
    profiles:
      - tools
